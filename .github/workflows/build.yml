name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pymupdf Pillow pdf2image pystray

      - name: Build EXE
        working-directory: server
        run: |
          pyinstaller --noconfirm --onefile --name "微信好友助手" --add-data "static;static" --add-data "preset_customers.json;." --add-data "extra_customers.json;." --add-data "config.json;." app.py

      - name: Copy config.json to dist
        working-directory: server
        run: |
          copy config.json dist\

      - name: Create release package
        working-directory: server/dist
        run: |
          Compress-Archive -Path * -DestinationPath wfhelper_v2.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: 微信好友助手 v2.0
          body: |
            微信好友助手 v2.0 服务器版
            
            ## 使用方法
            1. 下载 wfhelper_v2.zip 并解压
            2. 编辑 config.json 可修改监听地址和端口
            3. 双击 微信好友助手.exe 启动服务器
            4. 局域网其他设备访问 http://IP:8199
            
            ## config.json 说明
            - host: 监听地址，默认 0.0.0.0（所有网卡）
            - port: 监听端口，默认 8199
            - open_browser: 是否自动打开浏览器，默认 true
            - minimize_to_tray: 是否最小化到系统托盘，默认 false
          files: server/dist/wfhelper_v2.zip

name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pymupdf Pillow pdf2image

      - name: Build EXE
        working-directory: server
        run: |
          pyinstaller --noconfirm --onefile --name "微信好友助手" --add-data "static;static" --add-data "preset_customers.json;." --add-data "extra_customers.json;." --add-data "config.json;." app.py

      - name: Copy config.json to dist
        working-directory: server
        run: |
          copy config.json dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wfhelper-exe
          path: server/dist/
